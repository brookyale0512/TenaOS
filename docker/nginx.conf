# Rate limiting is applied ONLY to the expensive generation endpoints (LLM
# builds/runs). Cheap reads, the health probe, and the long-lived SSE event
# streams are never rate-limited: the SPA polls drafts/schema every few seconds
# and fires invalidation-driven refetches on every build event, so a global
# limit starves the UI and makes the agent look "offline".
limit_req_zone $binary_remote_addr zone=agent_gen:10m rate=120r/m;

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;

    client_max_body_size 100M;

    # ── Static SPA (built React frontend) ───────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    location = /favicon.ico { try_files $uri =404; access_log off; }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # ── TenaAgent API: SSE event streams ────────────────────────────────
    # Long-lived Server-Sent Events for live build/run progress. Never rate
    # limited, never buffered, with a long read timeout so the stream is not
    # severed mid-build. Must be declared before the other /agent-api blocks
    # so it wins regex precedence.
    location ~* ^/agent-api/(forms|reports)/drafts/[^/]+/(events|result) {
        proxy_pass http://127.0.0.1:8095;
        rewrite ^/agent-api(/.*)$ $1 break;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Cookie $http_cookie;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 10s;
    }

    # ── TenaAgent API: expensive generation endpoints ───────────────────
    # LLM-backed builds/runs. Protected by a generous per-client limit so a
    # burst of typed messages cannot overwhelm the single GPU, but high enough
    # that normal interactive use never trips it.
    location ~* ^/agent-api/(scribe|insights|material|forms/drafts/[^/]+/(messages|actions)|reports/drafts/[^/]+/(run|messages|actions)) {
        limit_req zone=agent_gen burst=40 nodelay;
        proxy_pass http://127.0.0.1:8095;
        rewrite ^/agent-api(/.*)$ $1 break;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Cookie $http_cookie;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_read_timeout 180s;
        proxy_connect_timeout 10s;
    }

    # ── TenaAgent API: cheap reads, health, polling (no rate limit) ─────
    location /agent-api/ {
        proxy_pass http://127.0.0.1:8095/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Cookie $http_cookie;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # ── OpenMRS (forward JSESSIONID for SPA login flow) ────────────────
    location /openmrs/ {
        proxy_pass http://127.0.0.1:8080/openmrs/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
        # Broaden the JSESSIONID path from /openmrs to / so the browser also
        # sends it to the same-origin /agent-api endpoints. The TenaAgent
        # service validates this session cookie (require_openmrs_session);
        # without this rewrite the cookie is scoped to /openmrs only and every
        # /agent-api call 401s, which the SPA's global handler treats as a
        # session expiry and bounces the user back to /login on first load.
        proxy_cookie_path /openmrs/ /;
        proxy_cookie_path /openmrs /;
        proxy_http_version 1.1;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        # Suppress the WWW-Authenticate header that OpenMRS sends on 401
        # responses. Without this the browser shows its own Basic Auth
        # credential dialog on top of the SPA login form.
        proxy_hide_header WWW-Authenticate;
    }

    # ── SPA history-mode fallback ──────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
