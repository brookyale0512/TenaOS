server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;

    client_max_body_size 100M;

    # ── Static SPA (built React frontend) ───────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    location = /favicon.ico { try_files $uri =404; access_log off; }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # ── TenaAgent API ───────────────────────────────────────────────────
    location ~* ^/agent-api/(scribe|insights|material|reports/drafts/[^/]+/run) {
        proxy_pass http://127.0.0.1:8095;
        rewrite ^/agent-api(/.*)$ $1 break;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Cookie $http_cookie;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    location /agent-api/ {
        proxy_pass http://127.0.0.1:8095/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Cookie $http_cookie;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # ── OpenMRS (forward JSESSIONID for SPA login flow) ────────────────
    location /openmrs/ {
        proxy_pass http://127.0.0.1:8080/openmrs/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
        proxy_http_version 1.1;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ── SPA history-mode fallback ──────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
