# Security headers shared across all served locations. Sourced via include
# so any `add_header` in the surrounding location does not silently disable
# them (nginx replaces, not merges, when add_header appears at the location
# level).

add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'self'; media-src 'self' blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
# microphone=(self) is required for the voice scribe feature (MediaRecorder API).
# camera and geolocation remain blocked as this application has no need for them.
add_header Permissions-Policy "geolocation=(), camera=(), microphone=(self)" always;
# HSTS: instruct browsers to use HTTPS for 1 year once an HTTPS connection is established.
# Only effective when TLS terminates at nginx (i.e. the listener is on port 443).
# Safe to include unconditionally — HTTP-only listeners simply ignore it.
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
