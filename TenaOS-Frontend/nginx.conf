# Rate-limiting zones defined at http context level via include in nginx.conf.
# Scribe / insight endpoints are the most expensive (each call hits the LLM).
# 5 r/m per IP is generous for clinical use and prevents runaway client bugs.
limit_req_zone $binary_remote_addr zone=tena_agent_heavy:10m rate=5r/m;
# General TenaAgent API zone (form events, lab catalog reads, etc.) — 60 r/m.
limit_req_zone $binary_remote_addr zone=tena_agent_general:10m rate=60r/m;

server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Static assets get long cache; index.html stays no-cache so SPA shell
  # rolls forward on every deploy.
  location = /index.html {
    add_header Cache-Control "no-cache" always;
    include /etc/nginx/conf.d/security-headers.conf;
    try_files $uri =404;
  }

  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    include /etc/nginx/conf.d/security-headers.conf;
    try_files $uri =404;
  }

  # SPA fallback for client-side routes.
  location / {
    include /etc/nginx/conf.d/security-headers.conf;
    try_files $uri $uri/ /index.html;
  }

  # Same-origin proxy to OpenMRS. We pass through the user's JSESSIONID
  # cookie and Set-Cookie response so the SPA can authenticate as the
  # logged-in user. No static admin credentials are ever injected here.
  location /openmrs/ {
    proxy_pass ${OPENMRS_UPSTREAM_URL};
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Cookie $http_cookie;
    proxy_pass_header Set-Cookie;
    proxy_http_version 1.1;
    proxy_request_buffering off;
    proxy_buffering off;
  }

  # Same-origin proxy to the local TenaAgent service. The browser never talks
  # directly to vLLM; TenaAgent service owns patient context, DAK execution, and
  # model tool routing.

  # LLM-heavy endpoints: scribe, insights, material, report run.
  location ~* ^/agent-api/(scribe|insights|material|reports/drafts/[^/]+/run) {
    limit_req zone=tena_agent_heavy burst=3 nodelay;
    limit_req_status 429;

    proxy_pass ${TENA_AGENT_UPSTREAM_URL};
    rewrite ^/agent-api(/.*)$ $1 break;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header Cookie $http_cookie;
    proxy_http_version 1.1;
    proxy_request_buffering off;
    proxy_buffering off;
    proxy_read_timeout 120s;
  }

  # All other TenaAgent API traffic.
  location /agent-api/ {
    limit_req zone=tena_agent_general burst=20 nodelay;
    limit_req_status 429;

    proxy_pass ${TENA_AGENT_UPSTREAM_URL}/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header Cookie $http_cookie;
    proxy_http_version 1.1;
    proxy_request_buffering off;
    proxy_buffering off;
    proxy_read_timeout 30s;
  }

  # Deprecated compatibility alias. New deployments should use /agent-api.
  location ~* ^/cds-api/(scribe|insights|material|reports/drafts/[^/]+/run) {
    limit_req zone=tena_agent_heavy burst=3 nodelay;
    limit_req_status 429;

    proxy_pass ${TENA_AGENT_UPSTREAM_URL};
    rewrite ^/cds-api(/.*)$ $1 break;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header Cookie $http_cookie;
    proxy_http_version 1.1;
    proxy_request_buffering off;
    proxy_buffering off;
    proxy_read_timeout 120s;
  }

  location /cds-api/ {
    limit_req zone=tena_agent_general burst=20 nodelay;
    limit_req_status 429;

    proxy_pass ${TENA_AGENT_UPSTREAM_URL}/;
    rewrite ^/cds-api(/.*)$ $1 break;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header Cookie $http_cookie;
    proxy_http_version 1.1;
    proxy_request_buffering off;
    proxy_buffering off;
    proxy_read_timeout 30s;
  }
}
