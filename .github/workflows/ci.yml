name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guard:
    name: Repository hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Forbidden paths guard
        run: ./scripts/ci-guard.sh

  shell-lint:
    name: Shell scripts parse
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Parse-check all shell scripts
        run: |
          set -euo pipefail
          shopt -s globstar nullglob
          status=0
          for script in TenaOS-Backend/scripts/**/*.sh scripts/*.sh docker/*.sh; do
            if ! bash -n "$script"; then
              echo "Parse error in $script" >&2
              status=1
            fi
          done
          exit "$status"

  python:
    name: TenaAgent — syntax + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install TenaAgent test deps
        working-directory: TenaAgent/service
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest
      - name: Syntax check
        run: python -m compileall -q TenaAgent
      - name: Unit tests
        working-directory: TenaAgent/service
        run: python -m pytest -q

  frontend:
    name: Frontend lint, typecheck, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: TenaOS-Frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: TenaOS-Frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm test
      - name: Build
        run: npm run build
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
